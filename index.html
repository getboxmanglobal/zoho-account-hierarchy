<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Hierarchy</title>
    <script src="https://live.zwidgets.com/js-sdk/1.2/ZohoEmbededAppSDK.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary: #2563eb;
            --primary-soft: #eff6ff;
            --parent: #7c3aed;
            --parent-soft: #f5f3ff;
            --child-border: #e5e7eb;
            --text: #1f2937;
            --muted: #6b7280;
            --bg: #f8fafc;
            --line: #d7dde8;
        }

        html, body {
            width: 100%;
            min-height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: transparent;
            color: var(--text);
            overflow: hidden;
        }

        body { padding: 0; }

        .container {
            background: #fff;
            border-radius: 8px;
            border: 1px solid #edf0f5;
            padding: 14px 16px 12px;
            width: 100%;
            min-height: 240px;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding-bottom: 10px;
            border-bottom: 1px solid #eef1f6;
            margin-bottom: 10px;
        }

        .title-wrap { display: flex; flex-direction: column; gap: 2px; }
        .header h2 { font-size: 16px; line-height: 1.2; font-weight: 700; color: #26384f; }
        .subtext { font-size: 11px; color: var(--muted); }

        .controls { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
        .btn {
            height: 30px;
            padding: 0 12px;
            border: 1px solid #cfd7e6;
            border-radius: 6px;
            background: #fff;
            color: #334155;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn:hover { background: #f8fafc; }
        .btn-primary { background: var(--primary); border-color: var(--primary); color: #fff; }
        .btn-primary:hover { background: #1d4ed8; }

        .summary-bar {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 8px;
            margin-bottom: 10px;
        }

        .summary-card {
            border: 1px solid #edf0f5;
            background: #fbfcff;
            border-radius: 7px;
            padding: 8px 10px;
            min-height: 44px;
        }
        .summary-label { font-size: 10px; color: var(--muted); margin-bottom: 2px; }
        .summary-value { font-size: 13px; font-weight: 700; color: #26384f; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .hierarchy-wrap {
            background: var(--bg);
            border: 1px solid #eef1f6;
            border-radius: 8px;
            padding: 8px;
            max-height: 360px;
            overflow: auto;
        }

        .hierarchy-list { list-style: none; display: flex; flex-direction: column; gap: 6px; }
        .tree-item { position: relative; }
        .tree-row {
            display: grid;
            grid-template-columns: 28px minmax(220px, 1fr) 90px 110px;
            align-items: center;
            gap: 8px;
            min-height: 44px;
            background: #fff;
            border: 1px solid var(--child-border);
            border-radius: 7px;
            padding: 7px 9px;
            cursor: pointer;
            transition: border-color .15s ease, background .15s ease, box-shadow .15s ease;
        }
        .tree-row:hover { border-color: var(--primary); box-shadow: 0 2px 8px rgba(37,99,235,.10); }
        .tree-row.current { border-color: var(--primary); background: var(--primary-soft); }
        .tree-row.parent { border-color: var(--parent); background: var(--parent-soft); }

        .level-dot {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: grid;
            place-items: center;
            font-size: 11px;
            font-weight: 700;
            background: #eef2f7;
            color: #64748b;
        }
        .tree-row.current .level-dot { background: #dbeafe; color: var(--primary); }
        .tree-row.parent .level-dot { background: #ede9fe; color: var(--parent); }

        .acc-main { min-width: 0; }
        .acc-name { font-size: 13px; font-weight: 700; color: #1f2937; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .acc-meta { margin-top: 2px; font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .badge {
            justify-self: start;
            display: inline-block;
            padding: 3px 7px;
            border-radius: 999px;
            font-size: 10px;
            font-weight: 700;
            max-width: 90px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .badge-customer { background: #d1fae5; color: #065f46; }
        .badge-prospect { background: #fef3c7; color: #92400e; }
        .badge-default { background: #e5e7eb; color: #374151; }

        .role-label { font-size: 10px; color: var(--muted); justify-self: end; white-space: nowrap; }

        .children { list-style: none; margin-top: 6px; margin-left: 22px; padding-left: 16px; border-left: 2px solid var(--line); display: flex; flex-direction: column; gap: 6px; }

        .loading, .empty-state {
            height: 210px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: var(--muted);
            font-size: 13px;
        }
        .spinner {
            width: 28px;
            height: 28px;
            border: 3px solid #e5e7eb;
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin .8s linear infinite;
            margin: 0 auto 10px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .footer-note {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            padding-top: 8px;
            font-size: 10.5px;
            color: var(--muted);
        }

        @media (max-width: 850px) {
            .summary-bar { grid-template-columns: 1fr; }
            .tree-row { grid-template-columns: 24px minmax(160px, 1fr) 80px; }
            .role-label { display: none; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="title-wrap">
            <h2>Account Hierarchy</h2>
            <div class="subtext">Compact parent and member account view</div>
        </div>
        <div class="controls">
            <button class="btn btn-primary" onclick="refreshTree()">Refresh</button>
        </div>
    </div>

    <div id="summary"></div>
    <div id="content">
        <div class="loading"><div><div class="spinner"></div><p>Loading hierarchy...</p></div></div>
    </div>
    <div class="footer-note">
        <span>Click any account to open the CRM record.</span>
        <span id="recordCount"></span>
    </div>
</div>

<script>
    let currentAccountId = null;
    let allAccounts = {};
    let rootAccountId = null;

    ZOHO.embeddedApp.on("PageLoad", function(data) {
        console.log("PageLoad fired", data);
        currentAccountId = Array.isArray(data.EntityId) ? data.EntityId[0] : data.EntityId;
        currentAccountId = currentAccountId ? String(currentAccountId) : null;
        console.log("Current Account ID set", currentAccountId);

        if (!currentAccountId) {
            showEmpty("Account ID was not received from Zoho CRM.");
            return;
        }
        loadHierarchy();
    });

    ZOHO.embeddedApp.init();

    async function loadHierarchy() {
        try {
            allAccounts = {};
            rootAccountId = null;
            setLoading("Loading hierarchy...");

            console.log("Calling getRecord for", currentAccountId);
            const currentResp = await ZOHO.CRM.API.getRecord({ Entity: "Accounts", RecordID: currentAccountId });
            console.log("getRecord response received", currentResp);

            if (!currentResp || !currentResp.data || !currentResp.data[0]) {
                showEmpty("Could not load account details from Zoho CRM.");
                return;
            }

            let currentAccount = currentResp.data[0];
            allAccounts[String(currentAccount.id)] = currentAccount;

            let topAccount = currentAccount;
            let safety = 0;
            while (topAccount.Parent_Account && topAccount.Parent_Account.id && safety < 20) {
                const parentId = String(topAccount.Parent_Account.id);
                const parentResp = await ZOHO.CRM.API.getRecord({ Entity: "Accounts", RecordID: parentId });
                if (parentResp && parentResp.data && parentResp.data[0]) {
                    topAccount = parentResp.data[0];
                    allAccounts[String(topAccount.id)] = topAccount;
                } else {
                    break;
                }
                safety++;
            }

            rootAccountId = String(topAccount.id);
            await fetchChildrenRecursive(rootAccountId);

            const tree = buildTree(rootAccountId);
            renderSummary(tree);
            renderCompactTree(tree);

        } catch (err) {
            console.error("Error loading hierarchy:", err);
            showEmpty("Error loading hierarchy. Please check the browser console.");
        }
    }

    async function fetchChildrenRecursive(parentId) {
        try {
            const resp = await ZOHO.CRM.API.searchRecord({
                Entity: "Accounts",
                Type: "criteria",
                Query: "(Parent_Account:equals:" + parentId + ")"
            });

            if (resp && resp.data && resp.data.length > 0) {
                resp.data.sort((a, b) => String(a.Account_Name || '').localeCompare(String(b.Account_Name || '')));
                for (const child of resp.data) {
                    const childId = String(child.id);
                    if (!allAccounts[childId]) {
                        allAccounts[childId] = child;
                        await fetchChildrenRecursive(childId);
                    }
                }
            }
        } catch (err) {
            console.log("No children found or search error for", parentId, err);
        }
    }

    function buildTree(rootId) {
        const root = allAccounts[String(rootId)];
        if (!root) return null;

        const children = Object.keys(allAccounts)
            .map(id => allAccounts[id])
            .filter(acc => acc.Parent_Account && String(acc.Parent_Account.id) === String(rootId))
            .sort((a, b) => String(a.Account_Name || '').localeCompare(String(b.Account_Name || '')))
            .map(acc => buildTree(String(acc.id)))
            .filter(Boolean);

        return {
            id: String(root.id),
            name: root.Account_Name || 'Unnamed Account',
            industry: root.Industry || '',
            accountType: root.Account_Type || '',
            phone: root.Phone || '',
            children
        };
    }

    function renderSummary(tree) {
        const summary = document.getElementById('summary');
        if (!tree) { summary.innerHTML = ''; return; }

        const current = allAccounts[currentAccountId] || {};
        const count = countNodes(tree);
        const directChildren = tree.children ? tree.children.length : 0;

        summary.innerHTML =
            '<div class="summary-bar">' +
                '<div class="summary-card"><div class="summary-label">Top Parent</div><div class="summary-value" title="' + escapeHtml(tree.name) + '">' + escapeHtml(tree.name) + '</div></div>' +
                '<div class="summary-card"><div class="summary-label">Current Account</div><div class="summary-value" title="' + escapeHtml(current.Account_Name || '') + '">' + escapeHtml(current.Account_Name || 'Current record') + '</div></div>' +
                '<div class="summary-card"><div class="summary-label">Hierarchy Size</div><div class="summary-value">' + count + ' account' + (count === 1 ? '' : 's') + ' / ' + directChildren + ' direct child' + (directChildren === 1 ? '' : 'ren') + '</div></div>' +
            '</div>';

        document.getElementById('recordCount').textContent = count + ' account' + (count === 1 ? '' : 's') + ' loaded';
    }

    function renderCompactTree(tree) {
        if (!tree) { showEmpty("No hierarchy data found."); return; }
        document.getElementById('content').innerHTML =
            '<div class="hierarchy-wrap"><ul class="hierarchy-list">' + renderNode(tree, 0) + '</ul></div>';
    }

    function renderNode(node, level) {
        const isCurrent = String(node.id) === String(currentAccountId);
        const isParent = !isCurrent && isAncestor(node.id, currentAccountId);
        let rowClass = 'tree-row';
        if (isCurrent) rowClass += ' current';
        else if (isParent) rowClass += ' parent';

        const badgeClass = node.accountType === 'Customer' ? 'badge-customer' :
                           node.accountType === 'Prospect' ? 'badge-prospect' : 'badge-default';
        const role = isCurrent ? 'Current' : isParent ? 'Parent' : level === 0 ? 'Top Parent' : 'Member';
        const meta = [node.industry ? '🏢 ' + node.industry : '', node.phone ? '☎ ' + node.phone : ''].filter(Boolean).join('   ');

        let html = '<li class="tree-item">';
        html += '<div class="' + rowClass + '" onclick="openAccount(\'' + escapeJs(node.id) + '\')">';
        html += '<div class="level-dot">' + (level + 1) + '</div>';
        html += '<div class="acc-main"><div class="acc-name" title="' + escapeHtml(node.name) + '">' + escapeHtml(node.name) + '</div>';
        html += '<div class="acc-meta" title="' + escapeHtml(meta || 'No extra details') + '">' + escapeHtml(meta || 'No extra details') + '</div></div>';
        html += node.accountType ? '<span class="badge ' + badgeClass + '">' + escapeHtml(node.accountType) + '</span>' : '<span></span>';
        html += '<span class="role-label">' + role + '</span>';
        html += '</div>';

        if (node.children && node.children.length > 0) {
            html += '<ul class="children">';
            for (const child of node.children) html += renderNode(child, level + 1);
            html += '</ul>';
        }
        html += '</li>';
        return html;
    }

    function isAncestor(potentialAncestorId, descendantId) {
        let current = allAccounts[String(descendantId)];
        let safety = 0;
        while (current && current.Parent_Account && current.Parent_Account.id && safety < 20) {
            if (String(current.Parent_Account.id) === String(potentialAncestorId)) return true;
            current = allAccounts[String(current.Parent_Account.id)];
            safety++;
        }
        return false;
    }

    function countNodes(node) {
        if (!node) return 0;
        return 1 + (node.children || []).reduce((sum, child) => sum + countNodes(child), 0);
    }

    function openAccount(accountId) {
        ZOHO.CRM.UI.Record.open({ Entity: "Accounts", RecordID: String(accountId) });
    }

    function refreshTree() { loadHierarchy(); }

    function setLoading(message) {
        document.getElementById('summary').innerHTML = '';
        document.getElementById('recordCount').textContent = '';
        document.getElementById('content').innerHTML = '<div class="loading"><div><div class="spinner"></div><p>' + escapeHtml(message) + '</p></div></div>';
    }

    function showEmpty(message) {
        document.getElementById('summary').innerHTML = '';
        document.getElementById('recordCount').textContent = '';
        document.getElementById('content').innerHTML = '<div class="empty-state"><div><div style="font-size:34px;margin-bottom:8px;">🏢</div><p>' + escapeHtml(message) + '</p></div></div>';
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text == null ? '' : String(text);
        return div.innerHTML;
    }

    function escapeJs(text) {
        return String(text == null ? '' : text).replace(/\\/g, '\\\\').replace(/'/g, "\\'");
    }
</script>
</body>
</html>
