<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Hierarchy</title>
    <script src="https://live.zwidgets.com/js-sdk/1.2/ZohoEmbededAppSDK.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%;
            min-height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background: #fff;
            color: #172b4d;
            overflow-x: hidden;
        }

        body { padding: 0; }

        .container {
            width: 100%;
            background: #fff;
            border-radius: 0;
            padding: 12px 16px 10px;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding-bottom: 10px;
            margin-bottom: 10px;
            border-bottom: 1px solid #eef1f5;
        }

        .title-wrap { min-width: 0; }

        .header h2 {
            font-size: 16px;
            font-weight: 700;
            color: #253858;
            line-height: 1.2;
        }

        .sub-title {
            margin-top: 2px;
            font-size: 11px;
            color: #6b778c;
        }

        .controls { display: flex; gap: 6px; align-items: center; }

        .btn {
            padding: 7px 14px;
            border: 1px solid #dfe1e6;
            background: #fff;
            border-radius: 7px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            color: #42526e;
            transition: 0.15s ease;
            white-space: nowrap;
        }

        .btn:hover { background: #f4f5f7; }

        .btn-primary {
            background: #2f5bea;
            border-color: #2f5bea;
            color: #fff;
        }

        .btn-primary:hover { background: #244bd6; }

        .tree-shell {
            width: 100%;
            overflow: auto;
            background: #f8fafc;
            border: 1px solid #edf0f5;
            border-radius: 10px;
            padding: 16px 12px 12px;
            max-height: 330px;
        }

        .tree {
            display: inline-flex;
            justify-content: center;
            min-width: 100%;
            padding: 2px 8px 6px;
        }

        .tree ul {
            padding-top: 26px;
            position: relative;
            display: flex;
            justify-content: center;
            list-style: none;
            gap: 10px;
        }

        .tree li {
            position: relative;
            padding: 24px 2px 0;
            list-style: none;
            text-align: center;
        }

        .tree > ul { padding-top: 0; }
        .tree > ul > li { padding-top: 0; }

        .tree li::before,
        .tree li::after {
            content: "";
            position: absolute;
            top: 0;
            right: 50%;
            border-top: 2px solid #c9d4e5;
            width: calc(50% + 5px);
            height: 24px;
        }

        .tree li::after {
            right: auto;
            left: 50%;
            border-left: 2px solid #c9d4e5;
        }

        .tree > ul > li::before,
        .tree > ul > li::after,
        .tree li:only-child::before,
        .tree li:only-child::after { display: none; }

        .tree li:only-child { padding-top: 0; }
        .tree li:first-child::before,
        .tree li:last-child::after { border: 0 none; }
        .tree li:last-child::before { border-right: 2px solid #c9d4e5; border-radius: 0 7px 0 0; }
        .tree li:first-child::after { border-radius: 7px 0 0 0; }

        .tree ul ul::before {
            content: "";
            position: absolute;
            top: 0;
            left: 50%;
            border-left: 2px solid #c9d4e5;
            width: 0;
            height: 26px;
        }

        .node {
            display: inline-flex;
            flex-direction: column;
            gap: 5px;
            min-width: 190px;
            max-width: 210px;
            min-height: 88px;
            padding: 12px 14px;
            border: 1px solid #dfe4ea;
            border-radius: 10px;
            background: #fff;
            cursor: pointer;
            text-align: left;
            box-shadow: 0 2px 6px rgba(9, 30, 66, 0.05);
            transition: transform 0.14s ease, box-shadow 0.14s ease, border-color 0.14s ease;
        }

        .node:hover {
            transform: translateY(-1px);
            border-color: #2f5bea;
            box-shadow: 0 8px 18px rgba(47, 91, 234, 0.12);
        }

        .node.current {
            border: 2px solid #2f5bea;
            background: linear-gradient(135deg, #f0f6ff 0%, #e1eeff 100%);
            box-shadow: 0 6px 16px rgba(47, 91, 234, 0.16);
        }

        .node.parent {
            border: 2px solid #7c3aed;
            background: linear-gradient(135deg, #faf7ff 0%, #f0e9ff 100%);
        }

        .node-head {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 8px;
        }

        .node-name {
            font-weight: 700;
            font-size: 12.5px;
            line-height: 1.25;
            color: #172b4d;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .role-pill {
            flex: 0 0 auto;
            font-size: 9.5px;
            font-weight: 700;
            color: #2f5bea;
            background: #eaf0ff;
            border: 1px solid #c8d6ff;
            border-radius: 999px;
            padding: 2px 6px;
            line-height: 1.2;
        }

        .role-pill.parent-pill { color: #6d28d9; background: #f3e8ff; border-color: #ddd6fe; }
        .role-pill.member-pill { color: #5e6c84; background: #f4f5f7; border-color: #dfe1e6; }

        .node-meta {
            font-size: 11px;
            color: #5e6c84;
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .meta-line {
            display: block;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .badge {
            align-self: flex-start;
            display: inline-block;
            padding: 3px 7px;
            border-radius: 6px;
            font-size: 10px;
            font-weight: 700;
            line-height: 1;
        }

        .badge-customer { background: #dcfce7; color: #166534; }
        .badge-prospect { background: #fef3c7; color: #92400e; }
        .badge-default { background: #edf2f7; color: #42526e; }

        .footer-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-top: 8px;
            font-size: 11px;
            color: #6b778c;
        }

        .legend { display: flex; gap: 12px; flex-wrap: wrap; }
        .legend-item { display: flex; align-items: center; gap: 5px; }
        .legend-dot { width: 10px; height: 10px; border-radius: 3px; border: 2px solid; }
        .legend-dot.current { background: #e1eeff; border-color: #2f5bea; }
        .legend-dot.parent { background: #f0e9ff; border-color: #7c3aed; }
        .legend-dot.child { background: #fff; border-color: #dfe4ea; }

        .loading, .empty-state {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 180px;
            color: #6b778c;
            text-align: center;
        }

        .spinner {
            width: 28px;
            height: 28px;
            margin: 0 auto;
            border: 3px solid #dfe4ea;
            border-top-color: #2f5bea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 900px) {
            .node { min-width: 170px; max-width: 180px; }
            .tree ul { gap: 6px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="title-wrap">
                <h2>Account Hierarchy</h2>
                <div class="sub-title">Box view of parent and member accounts</div>
            </div>
            <div class="controls">
                <button class="btn btn-primary" onclick="refreshTree()">Refresh</button>
            </div>
        </div>

        <div id="content">
            <div class="loading">
                <div>
                    <div class="spinner"></div>
                    <p style="margin-top:10px;">Loading hierarchy...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentAccountId = null;
        let allAccounts = {};
        let totalAccountsLoaded = 0;

        function debugLog(message, data) {
            console.log(message, data || "");
        }

        ZOHO.embeddedApp.on("PageLoad", function(data) {
            debugLog("PageLoad fired", data);

            if (Array.isArray(data.EntityId)) {
                currentAccountId = data.EntityId[0];
            } else {
                currentAccountId = data.EntityId;
            }

            if (!currentAccountId) {
                showEmpty("Account ID was not received from Zoho CRM PageLoad.");
                return;
            }

            currentAccountId = String(currentAccountId);
            debugLog("Current Account ID set", currentAccountId);
            loadHierarchy();
        });

        ZOHO.embeddedApp.init();

        async function loadHierarchy() {
            try {
                debugLog("Calling getRecord for", currentAccountId);
                const currentResp = await ZOHO.CRM.API.getRecord({
                    Entity: "Accounts",
                    RecordID: currentAccountId
                });

                debugLog("getRecord response received", currentResp);

                if (!currentResp || !currentResp.data || !currentResp.data[0]) {
                    showEmpty("Could not load account details. Check widget permissions and Account ID.");
                    return;
                }

                const currentAccount = currentResp.data[0];
                allAccounts[String(currentAccount.id)] = currentAccount;

                let topAccount = currentAccount;
                let safety = 0;

                while (topAccount.Parent_Account && topAccount.Parent_Account.id && safety < 20) {
                    const parentId = String(topAccount.Parent_Account.id);
                    const parentResp = await ZOHO.CRM.API.getRecord({
                        Entity: "Accounts",
                        RecordID: parentId
                    });

                    if (parentResp && parentResp.data && parentResp.data[0]) {
                        topAccount = parentResp.data[0];
                        allAccounts[String(topAccount.id)] = topAccount;
                    } else {
                        break;
                    }
                    safety++;
                }

                await fetchChildrenRecursive(String(topAccount.id));

                const tree = buildTree(String(topAccount.id));
                totalAccountsLoaded = Object.keys(allAccounts).length;
                renderTree(tree);
            } catch (err) {
                console.error("Error loading hierarchy:", err);
                showEmpty("Error loading hierarchy. Check browser console for details.");
            }
        }

        async function fetchChildrenRecursive(parentId) {
            try {
                const resp = await ZOHO.CRM.API.searchRecord({
                    Entity: "Accounts",
                    Type: "criteria",
                    Query: "(Parent_Account:equals:" + parentId + ")"
                });

                if (resp && resp.data && resp.data.length > 0) {
                    resp.data.sort((a, b) => String(a.Account_Name || "").localeCompare(String(b.Account_Name || "")));

                    for (const child of resp.data) {
                        const childId = String(child.id);
                        if (!allAccounts[childId]) {
                            allAccounts[childId] = child;
                            await fetchChildrenRecursive(childId);
                        }
                    }
                }
            } catch (err) {
                debugLog("No children found or child lookup failed for " + parentId, err);
            }
        }

        function buildTree(rootId) {
            const root = allAccounts[rootId];
            if (!root) return null;

            const node = {
                id: String(root.id),
                name: root.Account_Name,
                industry: root.Industry,
                accountType: root.Account_Type,
                phone: root.Phone,
                children: []
            };

            const childAccounts = [];
            for (const accId in allAccounts) {
                const acc = allAccounts[accId];
                if (acc.Parent_Account && String(acc.Parent_Account.id) === rootId) {
                    childAccounts.push(acc);
                }
            }

            childAccounts.sort((a, b) => String(a.Account_Name || "").localeCompare(String(b.Account_Name || "")));
            node.children = childAccounts.map(acc => buildTree(String(acc.id))).filter(Boolean);

            return node;
        }

        function renderTree(tree) {
            if (!tree) {
                showEmpty("No hierarchy data found.");
                return;
            }

            const container = document.getElementById("content");
            container.innerHTML =
                '<div class="tree-shell" id="treeShell"><div class="tree"><ul>' + renderNode(tree) + '</ul></div></div>' +
                '<div class="footer-bar">' +
                    '<div class="legend">' +
                        '<div class="legend-item"><span class="legend-dot current"></span><span>Current</span></div>' +
                        '<div class="legend-item"><span class="legend-dot parent"></span><span>Parent</span></div>' +
                        '<div class="legend-item"><span class="legend-dot child"></span><span>Member</span></div>' +
                    '</div>' +
                    '<div>' + totalAccountsLoaded + ' accounts loaded</div>' +
                '</div>';

            setTimeout(centerTree, 100);
        }

        function renderNode(node) {
            const isCurrent = String(node.id) === String(currentAccountId);
            const isParent = !isCurrent && isAncestor(String(node.id), String(currentAccountId));

            let nodeClass = "node";
            if (isCurrent) nodeClass += " current";
            else if (isParent) nodeClass += " parent";

            let roleText = "Member";
            let roleClass = "member-pill";
            if (isCurrent) { roleText = "Current"; roleClass = "current-pill"; }
            else if (isParent) { roleText = "Parent"; roleClass = "parent-pill"; }

            const badgeClass = node.accountType === "Customer" ? "badge-customer" :
                              node.accountType === "Prospect" ? "badge-prospect" : "badge-default";

            let html = '<li>';
            html += '<div class="' + nodeClass + '" onclick="openAccount(\'' + escapeJs(node.id) + '\')" title="Open account">';
            html += '<div class="node-head">';
            html += '<div class="node-name" title="' + escapeHtml(node.name || "Unnamed") + '">' + escapeHtml(node.name || "Unnamed") + '</div>';
            html += '<span class="role-pill ' + roleClass + '">' + roleText + '</span>';
            html += '</div>';
            html += '<div class="node-meta">';
            if (node.industry) html += '<span class="meta-line">🏢 ' + escapeHtml(node.industry) + '</span>';
            if (node.phone) html += '<span class="meta-line">☎ ' + escapeHtml(node.phone) + '</span>';
            html += '</div>';
            if (node.accountType) html += '<span class="badge ' + badgeClass + '">' + escapeHtml(node.accountType) + '</span>';
            html += '</div>';

            if (node.children && node.children.length > 0) {
                html += '<ul>';
                for (const child of node.children) {
                    html += renderNode(child);
                }
                html += '</ul>';
            }

            html += '</li>';
            return html;
        }

        function isAncestor(potentialAncestorId, descendantId) {
            let current = allAccounts[descendantId];
            let safety = 0;
            while (current && current.Parent_Account && current.Parent_Account.id && safety < 20) {
                const parentId = String(current.Parent_Account.id);
                if (parentId === String(potentialAncestorId)) return true;
                current = allAccounts[parentId];
                safety++;
            }
            return false;
        }

        function centerTree() {
            const shell = document.getElementById("treeShell");
            if (!shell) return;
            shell.scrollLeft = Math.max(0, (shell.scrollWidth - shell.clientWidth) / 2);
        }

        function openAccount(accountId) {
            ZOHO.CRM.UI.Record.open({ Entity: "Accounts", RecordID: String(accountId) });
        }

        function refreshTree() {
            allAccounts = {};
            totalAccountsLoaded = 0;
            document.getElementById("content").innerHTML = '<div class="loading"><div><div class="spinner"></div><p style="margin-top:10px;">Refreshing...</p></div></div>';
            loadHierarchy();
        }

        function showEmpty(message) {
            document.getElementById("content").innerHTML = '<div class="empty-state"><div><div style="font-size:32px;margin-bottom:8px;">🏢</div><p>' + escapeHtml(message) + '</p></div></div>';
        }

        function escapeHtml(text) {
            if (!text) return "";
            const div = document.createElement("div");
            div.textContent = String(text);
            return div.innerHTML;
        }

        function escapeJs(text) {
            return String(text).replace(/\\/g, "\\\\").replace(/'/g, "\\'");
        }
    </script>
</body>
</html>
